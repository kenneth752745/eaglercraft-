# PaperMC Configuration for Spigot server

# General Settings
settings:
  update-interval: 1
  use-experimental: true

# Configuration for Minecraft Version Support
version:
  supported: true
  versions:
    - 1.8.8
    - 1.12.2

# Performance Settings
performance:
  optimize-entity-updates: true
  enable-async-chunks: true

# Miscellaneous
logging:
  enable-verbose-logging: false

# Player settings
player:
  max-players: 100
  spawn-protection: 16